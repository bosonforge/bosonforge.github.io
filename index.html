<style>
  :root {
    --bg: #161616;
    --bg-elev: #1e1e1e;
    --border: #383838;
    --text: #ebe9e0;
    --dim: #888888;
    --green: #ff7a1f;        /* primary accent = vivid orange */
    --blue: #7a9cb0;
    --purple: #ffa566;       /* lighter orange for tags */
    --orange: #ff9933;       /* heading orange */
    --titlebar: #2a2a2a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .terminal {
    width: 100%;
    max-width: 1140px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
    overflow: hidden;
  }
  .titlebar {
    background: var(--titlebar);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red    { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green  { background: #28c840; }
  .titlebar-title {
    flex: 1;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.3px;
  }
  .body { padding: 32px 36px 36px; position: relative; }
  .corner-photo {
    position: absolute;
    top: 28px;
    right: 32px;
    width: 180px;
    height: 180px;
    border-radius: 12px;
    object-fit: cover;
    object-position: 50% 22%;
    border: 1px solid var(--border);
    box-shadow: 0 8px 24px rgba(255, 122, 31, 0.22);
    z-index: 5;
  }
  .boot { color: var(--dim); font-size: 12.5px; margin-bottom: 18px; }
  .boot .ok { color: var(--green); }
  .prompt .user { color: var(--green); }
  .prompt .host { color: var(--blue); }
  .prompt .path { color: var(--purple); }
  .nav {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 18px 0 22px;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s ease;
  }
  .nav-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(126, 231, 135, 0.06);
    transform: translateY(-1px);
  }
  .nav-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(126, 231, 135, 0.10);
  }
  .nav-btn svg { width: 14px; height: 14px; }
  .output {
    border-left: 2px solid var(--border);
    padding: 6px 0 6px 14px;
    margin-top: 10px;
    min-height: 160px;
  }
  .output h2 {
    color: var(--orange);
    font-size: 14px;
    margin: 0 0 12px 0;
    font-weight: 600;
  }
  .output p  { margin: 0 0 10px 0; }
  .output a  { color: var(--blue); text-decoration: none; }
  .output a:hover { text-decoration: underline; }
  .output ul { padding-left: 16px; margin: 8px 0; }
  .output li { margin-bottom: 6px; }
  .date { color: var(--dim); }
  .dim  { color: var(--dim); }
  .tag  { color: var(--purple); }
  .me   { color: var(--green); font-weight: 600; }
  .output strong { color: var(--text); }
  .tree {
    margin: 0;
    padding: 4px 0 0 0;
    overflow-x: auto;
    line-height: 1.75;
    font-size: 14px;
    font-family: inherit;
  }
  .tree-line {
    white-space: pre;
    animation: outReveal 0.3s ease-out backwards;
    animation-delay: calc(var(--i, 0) * 35ms);
  }
  .tree strong { color: var(--text); font-weight: 600; }
  .tree a { color: var(--blue); text-decoration: none; }
  .tree a:hover { text-decoration: underline; }
  .tree::-webkit-scrollbar { height: 6px; }
  .tree::-webkit-scrollbar-track { background: transparent; }
  .tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .output .tree { animation: none; }
  .boot div { animation: fadeIn 0.18s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }

  /* Autoregressive-style cascade reveal in output */
  .output > * { animation: outReveal 0.4s ease-out backwards; }
  .output ul > li { animation: outReveal 0.35s ease-out backwards; }
  @keyframes outReveal {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }
  .output > *:nth-child(1) { animation-delay: 0ms; }
  .output > *:nth-child(2) { animation-delay: 80ms; }
  .output > *:nth-child(3) { animation-delay: 160ms; }
  .output > *:nth-child(4) { animation-delay: 240ms; }
  .output > *:nth-child(5) { animation-delay: 320ms; }
  .output > *:nth-child(6) { animation-delay: 400ms; }
  .output > *:nth-child(7) { animation-delay: 480ms; }

  .output ul > li:nth-child(1)  { animation-delay: 100ms; }
  .output ul > li:nth-child(2)  { animation-delay: 160ms; }
  .output ul > li:nth-child(3)  { animation-delay: 220ms; }
  .output ul > li:nth-child(4)  { animation-delay: 280ms; }
  .output ul > li:nth-child(5)  { animation-delay: 340ms; }
  .output ul > li:nth-child(6)  { animation-delay: 400ms; }
  .output ul > li:nth-child(7)  { animation-delay: 460ms; }
  .output ul > li:nth-child(8)  { animation-delay: 520ms; }
  .output ul > li:nth-child(9)  { animation-delay: 580ms; }
  .output ul > li:nth-child(10) { animation-delay: 640ms; }
  .output ul > li:nth-child(n+11) { animation-delay: 700ms; }
  .profile-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .profile-img {
    width: 130px;
    height: 130px;
    border-radius: 6px;
    border: 1px solid var(--border);
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 6px 20px rgba(217, 119, 87, 0.12);
  }
  .profile-row .bio { flex: 1; min-width: 0; }
  .profile-row .bio p:first-child { margin-top: 0; }
  .cursor {
    display: inline-block;
    width: 8px; height: 15px;
    background: var(--green);
    vertical-align: -2px;
    animation: blink 1s steps(2) infinite;
    margin-left: 4px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ===== TYPING INPUT ===== */
  .prompt-line {
    position: relative;
    cursor: text;
  }
  #typed-text { color: var(--text); }
  #cmd-input {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    color: transparent;
    caret-color: transparent;
    padding: 0;
    margin: 0;
    z-index: 2;
  }
  #cmd-input:focus { outline: none; }

  @media (max-width: 640px) {
    body { padding: 10px; }
    .terminal { border-radius: 8px; }
    .titlebar { padding: 8px 10px; }
    .titlebar .dot { width: 10px; height: 10px; }
    .titlebar-title { font-size: 10.5px; }
    .body { padding: 18px 16px 22px; font-size: 12.5px; }
    .corner-photo {
      width: 100px; height: 100px;
      top: 16px; right: 16px;
      border-radius: 8px;
    }
    .boot { font-size: 11px; padding-right: 116px; line-height: 1.55; margin-bottom: 16px; }
    .nav { gap: 6px; margin: 14px 0 16px; }
    .nav-btn { font-size: 11.5px; padding: 7px 10px; gap: 6px; border-radius: 5px; }
    .nav-btn svg { width: 12px; height: 12px; }
    .output { padding-left: 10px; }
    .output h2 { font-size: 12.5px; margin-bottom: 8px; }
    .output p { font-size: 12.5px; line-height: 1.6; }
    .output ul { padding-left: 14px; }
    .output li { font-size: 12.5px; line-height: 1.55; }
    .tree { font-size: 10.5px; line-height: 1.65; }
    .date { font-size: 11px; }
    .cursor { width: 7px; height: 12px; }
  }

  @media (max-width: 900px) and (min-width: 641px) {
    .terminal { max-width: 100%; }
    .corner-photo { width: 130px; height: 130px; }
    .body { padding: 24px 24px 28px; }
  }
</style>

  const navEl = document.getElementById('nav');
  const outputEl = document.getElementById('output');
  const cmdEl = document.getElementById('current-cmd');

  let typingTimer = null;
  function typeCommand(text, done) {
    clearTimeout(typingTimer);
    cmdEl.textContent = '';
    let i = 0;
    const tick = () => {
      if (i <= text.length) {
        cmdEl.textContent = text.slice(0, i);
        i++;
        typingTimer = setTimeout(tick, 60);
      } else {
        typingTimer = null;
        if (done) done();
      }
    };
    tick();
  }

  const vibeWords = [
    'brewing', 'steeping', 'percolating', 'simmering', 'marinating',
    'thinking', 'pondering', 'cogitating', 'ruminating', 'mulling',
    'hallucinating', 'conjuring', 'dreaming', 'imagining', 'synthesizing',
    'crunching', 'parsing', 'compiling', 'indexing', 'computing',
    'wandering', 'spelunking', 'foraging', 'scanning',
    'untangling', 'unraveling', 'decoding', 'wrangling',
    'noodling', 'tinkering', 'doodling', 'vibing', 'wizarding'
  ];
  function vibeWord() {
    return vibeWords[Math.floor(Math.random() * vibeWords.length)];
  }

  function indexTreeLines() {
    outputEl.querySelectorAll('.tree-line').forEach((el, i) => {
      el.style.setProperty('--i', i);
    });
  }

  let thinkTimer = null;
  function thinkAndShow(html, key) {
    clearTimeout(thinkTimer);
    outputEl.innerHTML = `<p class="dim thinking">${vibeWord()}...</p>`;
    thinkTimer = setTimeout(() => {
      outputEl.innerHTML = html;
      indexTreeLines();
      thinkTimer = null;
    }, 450 + Math.random() * 250);
  }

  function render(key) {
    const s = sections[key];
    outputEl.innerHTML = '';
    typeCommand(s.cmd, () => {
      thinkAndShow(s.content, key);
    });
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.key === key);
    });
  }

  Object.entries(sections).forEach(([key, s]) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.dataset.key = key;
    btn.innerHTML = s.icon + '<span>' + s.label + '</span>';
    btn.addEventListener('click', () => render(key));
    navEl.appendChild(btn);
  });

  // Boot animation
  const bootLines = [
    '[<span class="ok">  OK  </span>] booting bosonforge.io v1.0',
    '[<span class="ok">  OK  </span>] loading profile: dheeraj vattikonda',
    '[<span class="ok">  OK  </span>] mounting /about /news /publications /blogs /contact',
    '[<span class="ok">  OK  </span>] indexed 6 publications &middot; 3 blogs &middot; 10 updates',
    '[<span class="ok">  OK  </span>] ready in 0.42s'
  ];
  const bootEl = document.getElementById('boot');
  bootLines.forEach((line, i) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.innerHTML = line;
      bootEl.appendChild(div);
    }, i * 240);
  });
  setTimeout(() => render('about'), bootLines.length * 240 + 200);

  // ===== HYBRID TYPING INPUT =====
  const cmdInput = document.getElementById('cmd-input');
  const typedText = document.getElementById('typed-text');
  const promptLine = document.getElementById('prompt-line');

  const aliases = {
    pubs: 'publications', pub: 'publications',
    blog: 'blogs', me: 'about', whoami: 'about'
  };
  const fileMap = {
    'about.md': 'about',
    'contact.txt': 'contact',
    'news.log': 'news'
  };

  function setActive(key) {
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.key === key);
    });
  }

  function showOutput(rawCmd, html, key, opts) {
    cmdEl.textContent = rawCmd;
    setActive(key || null);
    if (opts && opts.think) {
      thinkAndShow(html, key);
    } else {
      outputEl.innerHTML = html;
    }
  }

  function escapeHtml(s) {
    return s.replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  }

  function runCommand(raw) {
    const cmd = raw.trim();
    if (!cmd) return;
    const lower = cmd.toLowerCase();

    if (sections[lower]) {
      showOutput(cmd, sections[lower].content, lower, {think: true});
      return;
    }
    if (aliases[lower]) {
      showOutput(cmd, sections[aliases[lower]].content, aliases[lower], {think: true});
      return;
    }
    if (lower === 'help' || lower === '?') {
      showOutput(cmd, `
        <h2>## help</h2>
        <p><span class="dim">sections:</span> <span class="me">about</span> · <span class="me">news</span> · <span class="me">publications</span> · <span class="me">blogs</span> · <span class="me">contact</span></p>
        <p><span class="dim">aliases:</span> pubs, blog, me, whoami</p>
        <p><span class="dim">shell:</span> ls, pwd, date, clear, help</p>
        <p><span class="dim">also:</span> cat about.md, tree publications/, tail news.log</p>
        <p class="dim" style="margin-top:8px">tip: ↑/↓ for history. or just click the buttons.</p>
      `);
      return;
    }
    if (lower === 'clear' || lower === 'cls') {
      cmdEl.textContent = '';
      outputEl.innerHTML = '';
      setActive(null);
      return;
    }
    if (lower === 'ls' || lower === 'ls -la' || lower === 'ls -l') {
      showOutput(cmd, `<pre class="tree">about.md   contact.txt   news.log   publications/   blogs/</pre>`);
      return;
    }
    if (lower === 'pwd') {
      showOutput(cmd, `<pre class="tree">/home/dheeraj</pre>`);
      return;
    }
    if (lower === 'date') {
      showOutput(cmd, `<pre class="tree">${new Date().toString()}</pre>`);
      return;
    }
    if (lower.startsWith('cat ')) {
      const file = lower.slice(4).trim();
      if (fileMap[file]) {
        showOutput(cmd, sections[fileMap[file]].content, fileMap[file], {think: true});
        return;
      }
    }
    if (lower.startsWith('tree') || lower === 'ls publications/' || lower === 'ls publications') {
      showOutput(cmd, sections.publications.content, 'publications', {think: true});
      return;
    }
    if (lower.startsWith('tail') && lower.includes('news')) {
      showOutput(cmd, sections.news.content, 'news', {think: true});
      return;
    }
    if (lower === 'ls blogs/' || lower === 'ls blogs') {
      showOutput(cmd, sections.blogs.content, 'blogs', {think: true});
      return;
    }
    if (lower === 'sudo' || lower.startsWith('sudo ')) {
      showOutput(cmd, `<p class="dim">[sudo] password for dheeraj:<br>nice try.</p>`);
      return;
    }
    if (lower === 'exit' || lower === 'logout') {
      showOutput(cmd, `<p class="dim">no escape.</p>`);
      return;
    }
    showOutput(cmd, `<p><span style="color: var(--purple)">zsh:</span> command not found: ${escapeHtml(cmd)}<br><span class="dim">try: help</span></p>`);
  }

  const cmdHistory = [];
  let histIdx = -1;

  const completionList = [
    'about', 'news', 'publications', 'blogs', 'contact',
    'pubs', 'blog', 'me', 'whoami',
    'help', 'clear', 'ls', 'ls -la', 'pwd', 'date',
    'cat about.md', 'cat contact.txt',
    'tree publications/', 'tail news.log'
  ];

  function commonPrefix(arr) {
    if (!arr.length) return '';
    let p = arr[0];
    for (let i = 1; i < arr.length; i++) {
      while (!arr[i].startsWith(p)) p = p.slice(0, -1);
      if (!p) return '';
    }
    return p;
  }

  cmdInput.addEventListener('input', () => {
    typedText.textContent = cmdInput.value;
  });

  cmdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const v = cmdInput.value;
      cmdInput.value = '';
      typedText.textContent = '';
      if (v.trim()) {
        cmdHistory.push(v);
        histIdx = -1;
        runCommand(v);
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (cmdHistory.length === 0) return;
      if (histIdx < cmdHistory.length - 1) histIdx++;
      cmdInput.value = cmdHistory[cmdHistory.length - 1 - histIdx];
      typedText.textContent = cmdInput.value;
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) {
        histIdx--;
        cmdInput.value = cmdHistory[cmdHistory.length - 1 - histIdx];
      } else {
        histIdx = -1;
        cmdInput.value = '';
      }
      typedText.textContent = cmdInput.value;
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const partial = cmdInput.value.toLowerCase();
      if (!partial) return;
      const matches = completionList.filter(c => c.startsWith(partial));
      if (matches.length === 0) return;
      if (matches.length === 1) {
        cmdInput.value = matches[0];
        typedText.textContent = matches[0];
      } else {
        const cmn = commonPrefix(matches);
        if (cmn.length > partial.length) {
          cmdInput.value = cmn;
          typedText.textContent = cmn;
        } else {
          outputEl.innerHTML = `<p class="dim">${matches.join('   ')}</p>`;
          setActive(null);
        }
      }
    }
  });

  promptLine.addEventListener('click', () => cmdInput.focus());
  setTimeout(() => cmdInput.focus(), bootLines.length * 240 + 600);
</script>
</body>
</html>
